  <style>
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    .splash-logo {
      width: 64px;
      height: 64px;
    }

    .splash-footer {
      position: absolute;
      bottom: 32px;
      text-align: center;
      color: #666;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .splash-footer p {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    #root:not(:empty) + #splash-screen {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease-out, visibility 0.3s;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <div id="splash-screen">
    <img src="/lovable-uploads/bf69a7f7-550a-45a1-8808-a02fb889f8c5.png" alt="Logo" class="splash-logo" />
    <div class="splash-footer">
      <p>Medmacs App</p>
    </div>
  </div>

  <script>
    // Hide splash screen when React app is mounted
    const observer = new MutationObserver((mutations) => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => {
            splash.style.display = 'none';
          }, 500);
          observer.disconnect();
        }
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
