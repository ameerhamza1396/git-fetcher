<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Payment Gateway...</title>
  <style>
    body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #4b5563; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Loading Secure Payment Gateway...</p>

  <script>
    (function () {
      // Required PayFast fields
      var fields = [
        'MERCHANT_ID','Merchant_Name','MERCHANT_USERAGENT','TOKEN','PROCCODE',
        'TXNAMT','CUSTOMER_MOBILE_NO','CUSTOMER_EMAIL_ADDRESS','SUCCESS_URL',
        'FAILURE_URL','CHECKOUT_URL','BASKET_ID','ORDER_DATE','SIGNATURE',
        'VERSION','TXNDESC','CURRENCY_CODE','P1','P2','P3'
      ];

      var params = new URLSearchParams(window.location.search);
      var form = document.createElement('form');
      form.method = 'POST';
      form.action = 'https://ipg1.apps.net.pk/Ecommerce/api/Transaction/PostTransaction';

      fields.forEach(function (key) {
        var val = params.get(key);
        if (val !== null) {
          var input = document.createElement('input');
          input.type = 'hidden';
          input.name = key;
          input.value = val;
          form.appendChild(input);
        }
      });

      document.body.appendChild(form);
      form.submit();
    })();
  </script>
</body>
</html>
